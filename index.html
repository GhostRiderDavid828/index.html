<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vrei să ieși cu mine?</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #fbf6f0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            text-align: center;
        }

        .container {
            max-width: 600px;
            padding: 20px;
        }

        img {
            width: 150px;
            margin-bottom: 20px;
            transition: all 0.3s ease;
        }

        h2 {
            font-size: 1.2rem;
            color: #555;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        h1 {
            font-size: 2.5rem;
            color: #e63946;
            margin: 10px 0 40px 0;
        }

        .buttons {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
            min-height: 100px;
        }

        .btn {
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        #yesBtn {
            background-color: #e63946;
            color: white;
            box-shadow: 0 4px 15px rgba(230, 57, 70, 0.4);
        }

        #noBtn {
            background-color: #f4a261;
            color: white;
            box-shadow: 0 4px 15px rgba(244, 162, 97, 0.4);
        }
    </style>
</head>
<body>

    <div class="container">
        <img id="jocImg" src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExbWdtcmM0bnd5MW95Ym85MGptY3B1Y3g0eXFib3p3bTM0N3B0ZXZyayZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9cw/cLS1cfxvGOPVpf9g3y/giphy.gif" alt="Cute Cupid">
        
        <h2 id="subtitlu">Nicio obligație... spune da 🙏</h2>
        <h1 id="intrebare">Vrei să ieșim afară amândoi?</h1>

        <div class="buttons">
            <button class="btn" id="yesBtn" onclick="aiSpusDa()">Da ✨</button>
            <button class="btn" id="noBtn" onclick="aiSpusNu()">Nu</button>
        </div>
    </div>

    <script>
        const yesBtn = document.getElementById('yesBtn');
        const noBtn = document.getElementById('noBtn');
        const intrebare = document.getElementById('intrebare');
        const subtitlu = document.getElementById('subtitlu');
        const jocImg = document.getElementById('jocImg');

        let dimensiuneYes = 1.2;
        let paddingYesX = 40;
        let paddingYesY = 15;
        let numarApasariNu = 0;

        const mesajeNu = [
            "Sigur nu vrei? 🥺",
            "Mai gândește-te o dată... 🥺",
            "Te rog? 🌹",
            "Îți dau o înghețată! 🍦",
            "Apasă pe celălalt buton! 👈"
        ];

        function aiSpusNu() {
            numarApasariNu++;
            if (numarApasariNu <= mesajeNu.length) {
                intrebare.innerText = mesajeNu[numarApasariNu - 1];
            } else {
                intrebare.innerText = "Nu prea ai de ales! 😉";
            }

            dimensiuneYes += 0.3;
            paddingYesX += 15;
            paddingYesY += 5;

            yesBtn.style.fontSize = dimensiuneYes + "rem";
            yesBtn.style.padding = paddingYesY + "px " + paddingYesX + "px";
        }

        function aiSpusDa() {
            subtitlu.innerText = "YAY! 🎉";
            intrebare.innerText = "Te trimit pe pagina următoare să alegi când și unde... ❤️";
            jocImg.src = "https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExbnk1cmZ0am9za294b3g3bndpY3g0eXFpazV3Ym96dG0zN3B0ZXZyayZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9cw/26FLdmip65auYCj6w/giphy.gif";
            
            yesBtn.style.display = "none";
            noBtn.style.display = "none";

            // Așteaptă 2 secunde și o redirecționează către formularul tău Google
            setTimeout(function() {
                
                // ÎNLOCUIEȘTE textul de mai jos (păstrează ghilimelele) cu link-ul tău de la Google Forms:
                const linkFormular = "https://forms.gle/YQmgsmoywnbJvktM6";

                window.location.href = linkFormular;

            }, 2000); 
        }
    </script>

</body>
</html>
